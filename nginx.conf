server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://xmxsnpnikdbssgkuvsow.supabase.co; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https://xmxsnpnikdbssgkuvsow.supabase.co; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://xmxsnpnikdbssgkuvsow.supabase.co wss://xmxsnpnikdbssgkuvsow.supabase.co;" always;
}
