[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://xmxsnpnikdbssgkuvsow.supabase.co; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https://xmxsnpnikdbssgkuvsow.supabase.co; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://xmxsnpnikdbssgkuvsow.supabase.co wss://xmxsnpnikdbssgkuvsow.supabase.co;"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
